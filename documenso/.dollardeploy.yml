id: documenso
name: Documenso
intro: "The open source DocuSign alternative for signing documents digitally."
logo: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/svg/documenso.svg
tags:
  - documents
  - signing
  - esignature
  - oss
  - popular
deployTime: ~3 minutes
description: |
  Documenso is the open source signing infrastructure and a DocuSign
  alternative. Upload documents, collect legally binding electronic signatures,
  and manage signing workflows — all self-hosted. This template runs Documenso
  with a PostgreSQL database and generates a local signing certificate on first
  boot.
requirements:
  memory: 2048
  cpu: 2
  storage: 10
services:
  - docker
app:
  type: docker-compose
  repositoryUrl: https://github.com/dollardeploy/templates
  sourcePath: documenso
  sourceBranch: main
  mainPort: 3000
  env:
    PORT: 3000
    APP_URL: ${APP_URL}
    APP_HOSTNAME: ${APP_HOSTNAME}
    POSTGRES_PASSWORD: ${GENERATED_PWD}
    NEXTAUTH_SECRET: ${GENERATED_SECRET}
    NEXT_PRIVATE_ENCRYPTION_KEY: ${GENERATED_HASH}
    NEXT_PRIVATE_ENCRYPTION_SECONDARY_KEY: ${GENERATED_SECRET}${GENERATED_HASH}
    NEXT_PRIVATE_SIGNING_LOCAL_FILE_PASSPHRASE: ${GENERATED_HASH}${GENERATED_PWD}
postLaunchNote: |
  Documenso is starting at ${APP_URL}. The first boot generates a local signing
  certificate, so initial startup may take a minute.

  Open ${APP_URL} and create your admin account by signing up — the first
  registered user becomes the administrator.

  SMTP email is not configured by default. To send signing invitations and
  reset emails, add `NEXT_PRIVATE_SMTP_*` environment variables in the app
  settings. See https://docs.documenso.com/developers/local-development/signing-certificate
