id: documenso
name: Documenso
intro: "The open source DocuSign alternative for signing documents digitally."
logo: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/svg/documenso.svg
tags:
  - documents
  - signing
  - esignature
  - oss
  - popular
deployTime: ~3 minutes
description: |
  Documenso is the open source signing infrastructure and a DocuSign
  alternative. Upload documents, collect legally binding electronic signatures,
  and manage signing workflows — all self-hosted. This template runs Documenso
  with a PostgreSQL database and generates a local signing certificate on first
  boot.
requirements:
  memory: 2048
  cpu: 2
  storage: 20
services:
  - docker
app:
  type: docker-compose
  repositoryUrl: https://github.com/dollardeploy/templates
  sourcePath: documenso
  sourceBranch: main
  mainPort: 3000
  env:
    PORT: 3000
    NEXTAUTH_URL: ${APP_URL}
    NEXT_PUBLIC_WEBAPP_URL: ${APP_URL}
    DOCUMENSO_HOST: ${APP_HOSTNAME}
    POSTGRES_PASSWORD: ${GENERATED_PWD}
    NEXTAUTH_SECRET: ${GENERATED_SECRET}
    NEXT_PRIVATE_ENCRYPTION_KEY: ${GENERATED_HASH}
    NEXT_PRIVATE_ENCRYPTION_SECONDARY_KEY: ${GENERATED_SECRET}${GENERATED_HASH}
    NEXT_PRIVATE_SIGNING_LOCAL_FILE_PASSPHRASE: ${GENERATED_HASH}${GENERATED_PWD}
    NEXT_PRIVATE_SMTP_TRANSPORT: "smtp-auth"
    NEXT_PRIVATE_SMTP_HOST: "127.0.0.1"
    NEXT_PRIVATE_SMTP_PORT: 587
    NEXT_PRIVATE_SMTP_USERNAME: ""
    NEXT_PRIVATE_SMTP_PASSWORD: ""
    NEXT_PRIVATE_SMTP_SECURE: false
    NEXT_PRIVATE_RESEND_API_KEY: ""
    NEXT_PRIVATE_SMTP_FROM_ADDRESS: "example@example.com"
    NEXT_PRIVATE_SMTP_FROM_NAME: "Documenso"
    NEXT_PRIVATE_SIGNING_LOCAL_FILE_PATH: "/app/certs/cert.p12"
    CERT_INFO_COUNTRY_NAME: "US"
    CERT_INFO_STATE_OR_PROVIDENCE: "State"
    CERT_INFO_LOCALITY_NAME: "City"
    CERT_INFO_ORGANIZATION_NAME: "Organization"
    CERT_INFO_ORGANIZATIONAL_UNIT: "IT Department"
    CERT_INFO_EMAIL: "example@example.com"
postLaunchNote: |
  Open ${APP_URL} and create your admin account by signing up — the first
  registered user becomes the administrator.

  To send login confirmation, signing invitations and reset emails, change `NEXT_PRIVATE_SMTP_*` environment variables in the app
  settings. See https://docs.documenso.com/docs/self-hosting/configuration/environment
