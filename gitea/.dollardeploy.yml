id: gitea
name: Gitea
experimental: true
intro: Lightweight, self-hosted Git service — a fast alternative to GitHub/GitLab.
logo: https://raw.githubusercontent.com/go-gitea/gitea/main/public/assets/img/logo.svg
tags:
  - git
  - vcs
  - developer-tools
  - oss
  - experimental
deployTime: ~3 minutes
description: |
  Gitea is a painless, lightweight, self-hosted Git service written in Go.
  It provides repository hosting, issues, pull requests, a wiki, and CI hooks
  while running comfortably on modest hardware.

  This template runs Gitea backed by a PostgreSQL database. Repository and
  database data are persisted to local volumes. Git over HTTPS works through the
  app URL out of the box; Git over SSH is exposed on the host port SSH_PORT
  (default 2222) — open that port in your server firewall to use it.

  This template is experimental — verify the deployment on your own server
  before relying on it.
requirements:
  memory: 1024
  cpu: 1
  storage: 20
services:
  - docker
app:
  type: docker-compose
  repositoryUrl: https://github.com/dollardeploy/templates
  sourcePath: gitea
  sourceBranch: main
  dockerComposeFile: docker-compose.yml
  mainPort: 3000
  env:
    PORT: "3000"
    SSH_PORT: "2222"
    DB_PASSWORD: "gitea${GENERATED_HASH}"
    APP_HEALTHCHECK_PATH: "/api/healthz"
    DOCKER_COMPOSE_PULL: always
    APP_READY_TIMEOUT: 300
