id: openclaw
name: OpenClaw
intro: Self-hosted AI assistant that integrates with WhatsApp, Telegram, Slack, Discord and more.
logo: https://avatars.githubusercontent.com/u/252820863
tags:
  - ai
  - assistant
  - automation
  - oss
  - messaging
  - docker
deployTime: ~5 minutes
description: |
  OpenClaw is a self-hosted AI assistant platform with built-in browser automation.
  It supports multiple AI providers (Anthropic, OpenAI, OpenRouter, Gemini, xAI, Groq, Mistral, AWS Bedrock, Ollama, and more)
  and integrates with messaging platforms like WhatsApp, Telegram, Slack, and Discord.

  Includes a headless browser container for web automation tasks.
requirements:
  memory: 4096
  cpu: 2
  storage: 20
services:
  - docker
app:
  type: docker-compose
  repositoryUrl: https://github.com/dollardeploy/templates
  sourcePath: openclaw
  sourceBranch: main
  dockerComposeFile: docker-compose.yml
  env:
    PORT: "8080"
    AUTH_USERNAME: "admin"
    AUTH_PASSWORD: "${GENERATED_PWD}"
    OPENCLAW_GATEWAY_TOKEN: "${GENERATED_HASH}"
    ANTHROPIC_API_KEY: ""
    OPENAI_API_KEY: ""
    OPENROUTER_API_KEY: ""
    DOCKER_COMPOSE_WAIT_TIMEOUT: 120
postLaunchNote: |
  OpenClaw is running!

  Login credentials:
  - **Username**: admin
  - **Password**: ${GENERATED_PWD}

  Configure your AI provider API keys in the environment variables to start using OpenClaw.

  Documentation: https://docs.openclaw.ai/
