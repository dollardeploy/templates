id: pelican
name: Pelican
intro: Pelican is the ultimate, free game server control panel offering high flying security.
logo: https://pelican.dev/img/logo.png
tags:
  - devops
  - game-hosting
  - server-management
experimental: true
requirements:
  memory: 4096
  cpu: 2
  storage: 40
app:
  type: docker-compose
  repositoryUrl: https://github.com/dollardeploy/templates
  sourceBranch: main
  sourcePath: pelican
  dockerComposeFile: docker-compose.yml
  env:
    PORT: "3000"
    # Panel
    APP_TIMEZONE: "UTC"
    ADMIN_EMAIL: "${USER_EMAIL}"
    # Wings (official defaults)
    PORT_WINGS: "8080"
    PORT_SFTP: "2022"
    WINGS_UID: "988"
    WINGS_GID: "988"
    WINGS_USERNAME: "pelican"
services:
  - docker
deployTime: ~5 minutes
postLaunchNote: |
  The panel is up. Finish setup in the browser at **${APP_URL}/installer** —
  choose the default **SQLite** database and create your admin account there.
  Migrations run automatically during install.

  The panel's encryption key (`APP_KEY`) is generated automatically on first boot.
  Back it up if you want to be safe:

  ```
  docker compose logs panel | grep 'Generated app key'
  ```

  To host servers, add a **Node** in the panel pointing wings at this server's
  IP on port `${PORT_WINGS}` (SFTP on `${PORT_SFTP}`), then drop the generated
  config into `/etc/pelican/config.yml` and restart the wings container.

  **Uploading mods, worlds, or files:** use SFTP. Each server's *Settings → SFTP
  Details* shows the host and username (port `${PORT_SFTP}`); log in with your
  panel password. Drop mod jars in `/mods` and worlds in `/world` — files land
  with the correct ownership automatically.

  **Two things that trip people up:**
  - Always give a server a real **memory limit** — never `0`, or game-server
    installers run out of memory and fail silently.
  - Open your **game ports** (e.g. `25565`) in the host firewall so players can
    actually connect.
description: |
  From prehistoric to peak performance: Pelican takes flight! Pelican is the ultimate,
  free game server control panel offering high flying security. It's a breeze to manage
  your servers with our sleek and user-friendly interface. Thanks to Docker, every server
  runs in its own safe space. Pelican is 100% free and open source—forever—for you,
  your friends, family, and community. We support Minecraft, Terraria, Palworld, Valheim,
  Factorio, and so much more. Whether you're just playing with friends or running a gaming
  community, Pelican scales to the sky. Security is built in, with SSL, 2FA, AES-256
  encryption, and more. One click installs, automatic updates, and an active community
  make Pelican the best way to host your game servers.
