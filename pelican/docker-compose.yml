services:
  panel:
    image: ghcr.io/pelican-dev/panel:latest
    restart: always
    networks:
      - default
    ports:
      # Web UI served by Caddy on :80 (BEHIND_PROXY) — routed via DollarDeploy
      - "127.0.0.1:${PORT}:80"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - pelican-data:/pelican-data
      - pelican-logs:/var/www/html/storage/logs
    environment:
      XDG_DATA_HOME: /pelican-data
      APP_URL: "${APP_URL}"
      ADMIN_EMAIL: "${ADMIN_EMAIL}"
      # Run Caddy on plain HTTP :80 with auto_https off; DollarDeploy terminates TLS.
      BEHIND_PROXY: "true"

  wings:
    image: ghcr.io/pelican-dev/wings:latest
    restart: always
    networks:
      - wings0
    ports:
      - "${PORT_WINGS}:8080"
      - "${PORT_SFTP}:2022"
    tty: true
    environment:
      TZ: "${APP_TIMEZONE}"
      WINGS_UID: "${WINGS_UID}"
      WINGS_GID: "${WINGS_GID}"
      WINGS_USERNAME: "${WINGS_USERNAME}"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock"
      - "/var/lib/docker/containers/:/var/lib/docker/containers/"
      - "/etc/pelican/:/etc/pelican/"
      - "/var/lib/pelican/:/var/lib/pelican/"
      - "/var/log/pelican/:/var/log/pelican/"
      - "/tmp/pelican/:/tmp/pelican/"
      - "/etc/ssl/certs:/etc/ssl/certs:ro"
      # Let's Encrypt certs for wings SSL (node FQDN). Whole tree mounted so the
      # live/ symlinks into archive/ resolve inside the container.
      - "/etc/letsencrypt/:/etc/letsencrypt/:ro"

volumes:
  pelican-data:
  pelican-logs:

networks:
  default:
    ipam:
      config:
        - subnet: 172.20.0.0/16
  wings0:
    name: wings0
    driver: bridge
    ipam:
      config:
        - subnet: "172.21.0.0/16"
    driver_opts:
      com.docker.network.bridge.name: wings0
