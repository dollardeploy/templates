# yaml-language-server: $schema=https://raw.githubusercontent.com/dollardeploy/.github/refs/heads/main/template.schema.json
id: rustfs
name: RustFS
intro: High-performance, S3-compatible distributed object storage written in Rust.
description: |
  RustFS is a high-performance, S3-compatible distributed object storage system
  written in Rust. It is a fast, secure and cost-effective alternative to MinIO,
  built for AI/ML, analytics and data-intensive workloads.
  🔹 S3 API Compatible – Works with existing S3 tools and SDKs
  🔹 Written in Rust – Memory-safe and fast, with a small footprint
  🔹 Web Console – Manage buckets, objects and access keys from the browser

  This template runs single-node RustFS with data on a bind-mounted volume
  (captured by DollarDeploy backups). The S3 API is exposed at the app URL and
  the web console is available on a separate local port behind the reverse proxy.
logo: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/svg/rustfs.svg
requirements:
  memory: 1024
  cpu: 1
  storage: 10
deployTime: ~3 minutes
tags:
  - storage
  - s3
  - cloud
  - rust
  - oss
services:
  - docker
app:
  type: docker-compose
  repositoryUrl: https://github.com/dollardeploy/templates
  sourceBranch: main
  sourcePath: rustfs
  dockerComposeFile: docker-compose.yml
  mainPort: 9000
  env:
    # RustFS exposes a public GET /health endpoint that returns 200.
    APP_HEALTHCHECK_PATH: /health
    PORT: 9000
    PORT_CONSOLE: 9001
    RUSTFS_ACCESS_KEY: ${GENERATED_PWD}
    RUSTFS_SECRET_KEY: ${GENERATED_HASH}
    RUSTFS_VERSION: 1.0.0-beta.8
postLaunchNote: |
  RustFS is ready.

  S3 API endpoint: ${APP_URL}
  Web console:     reachable on the host at 127.0.0.1:${PORT_CONSOLE}

  Access key: `${RUSTFS_ACCESS_KEY}`
  Secret key: `${RUSTFS_SECRET_KEY}`

  Get started with the AWS CLI:

  ```bash
  export AWS_ACCESS_KEY_ID=${RUSTFS_ACCESS_KEY}
  export AWS_SECRET_ACCESS_KEY=${RUSTFS_SECRET_KEY}
  aws s3api --endpoint-url ${APP_URL} create-bucket --bucket test
  echo "Hello, world!" | aws s3 --endpoint-url ${APP_URL} cp - s3://test/hello.txt
  ```
