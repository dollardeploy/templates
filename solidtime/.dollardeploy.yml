---
id: solidtime
name: Solidtime
intro: Open source time tracker — the modern, self-hostable Toggl alternative.
logo: https://avatars.githubusercontent.com/u/156823565
tags:
  - solidtime
  - oss
  - time-tracking
  - productivity
  - laravel
deployTime: ~5 minutes
description: |
  Version: ${SOLIDTIME_IMAGE_TAG}. Solidtime is a modern open-source time
  tracking application. Track time across projects and clients, manage teams and
  organizations, set billable rates, and export detailed reports and invoices.
  A privacy-friendly, self-hostable alternative to Toggl and Clockify, built on
  Laravel + Vue. Ships as an all-in-one deployment with PostgreSQL, a queue
  worker, a scheduler, and Gotenberg for PDF export.
requirements:
  memory: 4096
  cpu: 2
  storage: 20
services:
  - docker
app:
  type: docker-compose
  repositoryUrl: https://github.com/dollardeploy/templates
  sourceBranch: main
  sourcePath: solidtime
  dockerComposeFile: docker-compose.yml
  preStartCmd: bash ./fixdocker.sh
  postStartCmd: bash ./setup-passport-client.sh
  backupCmd: docker compose exec -T database pg_dump -U ${DB_USERNAME} ${DB_DATABASE} > solidtime.sql
  files:
    - path: fixdocker.sh
    - path: setup-passport-client.sh
  env:
    PORT: "8000"
    SOLIDTIME_IMAGE_TAG: "0.14.0"
    PUBLIC_URL: "${APP_URL}"
    PUBLIC_HOSTNAME: "${APP_HOSTNAME}"
    ADMIN_EMAIL: "${USER_EMAIL}"
    DB_DATABASE: solidtime
    DB_USERNAME: solidtime
    DB_PASSWORD: "${GENERATED_PWD}"
    APP_HEALTHCHECK_PATH: "/health-check/up"
    APP_READY_TIMEOUT: "600"
    DOCKER_COMPOSE_WAIT_TIMEOUT: "600"
    POST_START_TIMEOUT: "180"
    APP_ENABLE_REGISTRATION: "true"
postLaunchNote: |
  First boot takes a few minutes while the database migrates and the app, queue,
  scheduler, and Gotenberg containers come up.

  Public registration is **enabled** so you can create that first account
  (Solidtime disables it by default). Once you're in, you can lock signups by
  setting `APP_ENABLE_REGISTRATION="false"` in `fixdocker.sh` and redeploying, or
  create users from the CLI instead:
  `docker compose exec scheduler php artisan admin:user:create "Your Name" "youremail@example.com" --verify-email`

  Email is set to the `log` driver by default (no mail is sent). To enable
  signup verification and invites, configure the `MAIL_*` settings and redeploy.
